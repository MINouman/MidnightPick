<head>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<title>Midnight Pick — Dashboard</title>
<link rel="icon" href="assets/logo.png" type="image/png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<script>if(!localStorage.getItem('mp_access_token')){window.location.replace('index.html');}</script>
<script src="mp-api.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;font-family:'DM Sans',system-ui,sans-serif;background:#1a0d07;display:flex;align-items:flex-start;justify-content:center;padding:24px 0 40px}
::-webkit-scrollbar{display:none}
*{scrollbar-width:none}
button,input,select,textarea{font-family:inherit}
@media(max-width:767px){
  html,body{background:#F7E3C9;padding:0 !important;display:block;height:100%;overflow:hidden;min-height:0}
  #root{position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden}
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes slideDown{from{transform:translateY(-100%)}to{transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef,useCallback,useContext,createContext}=React;

/* ── Context ────────────────────────────────────────────── */
const MobileCtx=createContext({
  user:null,orders:[],addresses:[],paymentMethods:[],pointsHistory:[],
  adminStats:null,adminOrders:[],adminCustomers:[],adminProducts:[],setAdminProducts:()=>{},
  adminInfluencers:[],setAdminInfluencers:()=>{},
});

/* ── Helpers ─────────────────────────────────────────────── */
function fmtDate(iso){
  if(!iso)return'—';
  return new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}
function fmtStatus(s){
  if(!s)return'—';
  return s.charAt(0).toUpperCase()+s.slice(1);
}
function orderSummary(items){
  if(!items||!items.length)return'—';
  return items.map(i=>`${i.name} ×${i.qty}`).join(', ');
}
function addrString(snap){
  if(!snap)return'—';
  try{const s=typeof snap==='string'?JSON.parse(snap):snap;return[s.line1,s.line2,s.city].filter(Boolean).join(', ');}
  catch(_){return String(snap);}
}

/* ── Icons ─────────────────────────────────────────────── */

  const p={width:size,height:size,viewBox:"0 0 24 24",fill:"none",stroke:color,strokeWidth,strokeLinecap:"round",strokeLinejoin:"round",style:{flexShrink:0,...xs}};
  const paths={
    home:<svg {...p}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>,
    package:<svg {...p}><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>,
    repeat:<svg {...p}><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>,

    user:<svg {...p}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
    flame:<svg {...p}><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>,
    users:<svg {...p}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
    trending:<svg {...p}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>,

    more:<svg {...p}><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>,
    bell:<svg {...p}><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>,
    chevright:<svg {...p}><polyline points="9 18 15 12 9 6"/></svg>,
    chevdown:<svg {...p}><polyline points="6 9 12 15 18 9"/></svg>,
    chevup:<svg {...p}><polyline points="18 15 12 9 6 15"/></svg>,
    check:<svg {...p}><polyline points="20 6 9 17 4 12"/></svg>,
    x:<svg {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
    coffee:<svg {...p}><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>,
    phone:<svg {...p}><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>,
    search:<svg {...p}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
    tag:<svg {...p}><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>,
    plus:<svg {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
    loader:<svg {...p} style={{animation:'spin 1s linear infinite',flexShrink:0,...xs}}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>,
    pencil:<svg {...p}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
    trash:<svg {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>,
    lock:<svg {...p}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
    share:<svg {...p}><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>,
    alert:<svg {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,
    clock:<svg {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
    refresh:<svg {...p}><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>,
    msg:<svg {...p}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>,
    bar:<svg {...p}><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>,
    settings:<svg {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
    customers:<svg {...p}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
    bolt:<svg {...p}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
  };
  return paths[n]||<svg {...p}><circle cx="12" cy="12" r="3"/></svg>;
}

/* ── Colors & Design Tokens ─────────────────────────────── */
const C={
  bg:'#F7E3C9',card:'#2C1810',cardAlt:'#3D2015',
  text:'#2C1810',textCard:'#F7E3C9',
  muted:'rgba(44,24,16,0.55)',mutedCard:'rgba(247,227,201,0.6)',
  orange:'#FF9100',green:'#4CAF84',red:'#e57373',blue:'#64B5F6',
  borderCard:'rgba(247,227,201,0.1)',borderBg:'rgba(44,24,16,0.1)',
  orangeFaint:'rgba(255,145,0,0.12)',greenFaint:'rgba(76,175,132,0.12)',
  redFaint:'rgba(229,115,115,0.12)',blueFaint:'rgba(100,181,246,0.12)',
};
const mono={fontFamily:"'DM Mono',monospace"};
const sans={fontFamily:"'DM Sans',system-ui,sans-serif"};

/* ── Shared Components ──────────────────────────────────── */
function Badge({status}){
  const s=status?status.toLowerCase():status;
  const map={
    processing:{bg:C.orangeFaint,color:'#CC7300'},
    confirmed:{bg:C.orangeFaint,color:'#CC7300'},
    packed:{bg:C.orangeFaint,color:'#CC7300'},
    packaged:{bg:C.orangeFaint,color:'#CC7300'},
    shipped:{bg:C.blueFaint,color:C.blue},
    delivered:{bg:C.greenFaint,color:C.green},
    cancelled:{bg:C.redFaint,color:C.red},
    active:{bg:C.greenFaint,color:C.green},
    paused:{bg:'rgba(247,227,201,0.1)',color:C.mutedCard},
    pending:{bg:C.orangeFaint,color:C.orange},
    paid:{bg:C.greenFaint,color:C.green},
  };
  const m=map[s]||{bg:'rgba(247,227,201,0.1)',color:C.mutedCard};
  const label=status?status.charAt(0).toUpperCase()+status.slice(1):status;
  return(
    <span style={{...mono,fontSize:10,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',
      background:m.bg,color:m.color,padding:'3px 10px',borderRadius:99,display:'inline-flex',alignItems:'center'}}>
      {label}
    </span>
  );
}

function BottomSheet({children,onClose,title}){
  return(
    <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(44,24,16,0.65)',zIndex:200,display:'flex',alignItems:'flex-end'}}>
      <div onClick={e=>e.stopPropagation()} style={{width:'100%',background:C.card,borderRadius:'20px 20px 0 0',padding:'12px 16px 32px',animation:'slideUp 250ms ease-out',maxHeight:'90%',overflowY:'auto'}}>
        <div style={{width:40,height:4,background:'rgba(247,227,201,0.2)',borderRadius:2,margin:'0 auto 20px'}}/>
        {title&&<div style={{...sans,fontSize:17,fontWeight:700,color:C.textCard,marginBottom:12}}>{title}</div>}
        {children}
      </div>
    </div>
  );
}

function Toast({msg,type='success',onDone}){
  useEffect(()=>{const t=setTimeout(onDone,type==='error'?5000:3000);return()=>clearTimeout(t);},[]);
  const cfg={success:{bg:C.greenFaint,border:C.green,icon:'check'},error:{bg:C.redFaint,border:C.red,icon:'x'},info:{bg:C.orangeFaint,border:C.orange,icon:'alert'}};
  const c=cfg[type]||cfg.success;
  return(
    <div style={{position:'absolute',top:56,left:12,right:12,zIndex:300,borderRadius:12,padding:'12px 14px',
      background:c.bg,borderLeft:`2px solid ${c.border}`,display:'flex',alignItems:'center',gap:10,
      animation:'slideDown 200ms ease'}}>
      <Ic n={c.icon} size={16} color={c.border}/>
      <span style={{...sans,fontSize:13,color:C.textCard,flex:1}}>{msg}</span>
      {type==='error'&&<button onClick={onDone} style={{background:'none',border:'none',cursor:'pointer',color:C.mutedCard}}><Ic n="x" size={14} color={C.mutedCard}/></button>}
    </div>
  );
}

function Pill({label,active,onClick}){
  return(
    <button onClick={onClick} style={{flexShrink:0,padding:'7px 14px',borderRadius:99,border:'none',cursor:'pointer',
      background:active?C.orange:C.cardAlt,color:active?C.card:C.mutedCard,
      ...sans,fontSize:12,fontWeight:active?700:500,transition:'all 150ms ease',whiteSpace:'nowrap'}}>
      {label}
    </button>
  );
}

function GhostBtn({children,onClick,full,style:xs}){
  return(
    <button onClick={onClick} style={{width:full?'100%':'auto',padding:'11px 18px',borderRadius:8,
      border:`1px solid rgba(247,227,201,0.2)`,background:'transparent',color:C.textCard,cursor:'pointer',
      ...sans,fontSize:13,fontWeight:600,display:'flex',alignItems:'center',justifyContent:'center',gap:8,
      transition:'all 200ms ease',...xs}}>
      {children}
    </button>
  );
}

function OrangeBtn({children,onClick,full,disabled,style:xs}){
  return(
    <button onClick={onClick} disabled={disabled} style={{width:full?'100%':'auto',padding:'11px 18px',borderRadius:8,
      border:'none',background:disabled?'rgba(255,145,0,0.25)':C.orange,
      color:disabled?'rgba(255,145,0,0.5)':C.card,cursor:disabled?'not-allowed':'pointer',
      ...sans,fontSize:13,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',gap:8,
      transition:'all 200ms ease',...xs}}>
      {children}
    </button>
  );
}

function Card({children,style:xs,onClick}){
  return(
    <div onClick={onClick} style={{background:C.card,borderRadius:16,padding:16,border:`1px solid ${C.borderCard}`,...xs,
      cursor:onClick?'pointer':'default',transition:'transform 100ms ease',
      WebkitTapHighlightColor:'transparent'}}
      onMouseDown={e=>{if(onClick)e.currentTarget.style.transform='scale(0.97)'}}
      onMouseUp={e=>{if(onClick)e.currentTarget.style.transform='scale(1)'}}
      onTouchStart={e=>{if(onClick)e.currentTarget.style.transform='scale(0.97)'}}
      onTouchEnd={e=>{if(onClick)e.currentTarget.style.transform='scale(1)'}}>
      {children}
    </div>
  );
}

function Eyebrow({children,style:xs}){
  return<div style={{...mono,fontSize:9,fontWeight:700,letterSpacing:'0.2em',textTransform:'uppercase',color:C.orange,marginBottom:8,...xs}}>{children}</div>;
}

function Row({children,style:xs}){return<div style={{display:'flex',alignItems:'center',gap:8,...xs}}>{children}</div>;}
function RowBetween({children,style:xs}){return<div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8,...xs}}>{children}</div>;}
function Col({children,style:xs}){return<div style={{display:'flex',flexDirection:'column',gap:8,...xs}}>{children}</div>;}

function StatStrip({stats}){
  return(
    <div style={{display:'flex',gap:8,marginBottom:12}}>
      {stats.map((s,i)=>(
        <div key={i} style={{flex:1,background:C.card,borderRadius:12,padding:12,border:`1px solid ${C.borderCard}`}}>
          <div style={{...mono,fontSize:9,color:C.orange,letterSpacing:'0.15em',textTransform:'uppercase',marginBottom:6}}>{s.label}</div>
          <div style={{...mono,fontSize:s.small?14:22,fontWeight:700,color:s.muted?C.mutedCard:C.textCard,lineHeight:1}}>{s.value}</div>
        </div>
      ))}
    </div>
  );
}

function ProgressBar({pct,height=4,style:xs}){
  return(
    <div style={{height,background:'rgba(247,227,201,0.15)',borderRadius:99,overflow:'hidden',...xs}}>
      <div style={{height:'100%',width:`${Math.min(100,pct)}%`,background:C.orange,borderRadius:99,transition:'width 400ms ease'}}/>
    </div>
  );
}

function DarkInput({value,onChange,placeholder,style:xs,right}){
  return(
    <div style={{position:'relative'}}>
      <input value={value} onChange={onChange} placeholder={placeholder}
        style={{width:'100%',background:C.cardAlt,border:`1px solid rgba(247,227,201,0.15)`,
          borderRadius:8,padding:'12px 14px',color:C.textCard,...mono,fontSize:14,letterSpacing:'0.05em',
          outline:'none',...xs}}/>
      {right&&<div style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',display:'flex',alignItems:'center'}}>{right}</div>}
    </div>
  );
}

function EmptyState({icon,title,body}){
  return(
    <div style={{textAlign:'center',padding:'48px 24px'}}>
      <Ic n={icon||'coffee'} size={48} color='rgba(44,24,16,0.2)'/>
      <div style={{...sans,fontSize:16,fontWeight:700,color:C.text,marginTop:16,marginBottom:6}}>{title}</div>
      {body&&<div style={{...sans,fontSize:13,color:C.muted,lineHeight:1.5}}>{body}</div>}
    </div>
  );
}

/* ── STATUS BAR ─────────────────────────────────────────── */
function StatusBar(){
  const now=new Date();
  const h=now.getHours().toString().padStart(2,'0');
  const m=now.getMinutes().toString().padStart(2,'0');
  return(
    <div style={{height:44,background:C.bg,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 20px',flexShrink:0}}>
      <span style={{...mono,fontSize:12,color:C.text,fontWeight:500}}>{h}:{m}</span>
      <div style={{display:'flex',alignItems:'center',gap:4}}>
        <span style={{fontSize:11,color:C.text}}>●●●</span>
        <span style={{fontSize:10,color:C.text,marginLeft:2}}>WiFi</span>
        <span style={{fontSize:10,color:C.text,marginLeft:2}}>■</span>
      </div>
    </div>
  );
}

/* ── BOTTOM NAV ─────────────────────────────────────────── */
const NAV_TABS={
  user:[
    {id:'home',icon:'home',label:'Home'},
    {id:'orders',icon:'package',label:'Orders'},
    {id:'subscription',icon:'repeat',label:'Subs'},
    {id:'points',icon:'star',label:'Points'},
    {id:'account',icon:'user',label:'Account'},
  ],
  crew:[
    {id:'home',icon:'home',label:'Home'},
    {id:'orders',icon:'package',label:'Orders'},
    {id:'crew',icon:'users',label:'Crew'},
    {id:'points',icon:'star',label:'Points'},
    {id:'account',icon:'user',label:'Account'},
  ],
  influencer:[
    {id:'home',icon:'home',label:'Home'},
    {id:'orders',icon:'package',label:'Orders'},
    {id:'performance',icon:'trending',label:'Perf'},
    {id:'payouts',icon:'wallet',label:'Payouts'},
    {id:'account',icon:'user',label:'Account'},
  ],
  admin:[
    {id:'overview',icon:'bar',label:'Overview'},
    {id:'orders',icon:'package',label:'Orders'},
    {id:'crew',icon:'users',label:'Crew'},
    {id:'coupons',icon:'tag',label:'Coupons'},
    {id:'more',icon:'more',label:'More'},
  ],
};

function BottomNav({role,tab,setTab,mobile}){
  const tabs=NAV_TABS[role]||NAV_TABS.user;
  return(
    <div style={{
      background:C.card,
      borderTop:`1px solid rgba(247,227,201,0.08)`,
      borderRadius:mobile?0:'20px 20px 0 0',
      boxShadow:'0 -4px 20px rgba(44,24,16,0.12)',
      display:'flex',alignItems:'stretch',
      paddingBottom:mobile?'max(env(safe-area-inset-bottom,0px),12px)':16,
      paddingTop:mobile?8:0,
      flexShrink:0,minHeight:mobile?0:80,
    }}>
      {tabs.map(t=>{
        const active=tab===t.id;
        return(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,display:'flex',flexDirection:'column',
            alignItems:'center',justifyContent:'center',gap:3,background:'none',border:'none',cursor:'pointer',
            color:active?C.orange:'rgba(247,227,201,0.4)',transition:'color 150ms ease',
            paddingTop:4,minWidth:0,WebkitTapHighlightColor:'transparent'}}>
            {active&&<div style={{width:5,height:5,background:C.orange,borderRadius:'50%',marginBottom:1}}/>}

function AdminOrdersTab(){
  const ctx=useContext(MobileCtx);
  const [orders,setOrders]=useState(ctx.adminOrders||[]);
  const [search,setSearch]=useState('');
  const [statusFilter,setStatusFilter]=useState('All');
  const [couponFilter,setCouponFilter]=useState('All');
  const [detail,setDetail]=useState(null);
  const [editMode,setEditMode]=useState(false);
  const [editFields,setEditFields]=useState({});
  const [cancelConfirm,setCancelConfirm]=useState(false);
  const [newOrderSheet,setNewOrderSheet]=useState(false);
  const [prodPickerOpen,setProdPickerOpen]=useState(false);
  const emptyOrder={customer:'',phone:'',address:'',orderItems:[],payment:'bKash',coupon:'',couponDiscount:0,couponState:null,couponError:'',notes:'',status:'processing'};
  const [newOrder,setNewOrder]=useState(emptyOrder);
  const [couponApplying,setCouponApplying]=useState(false);

  useEffect(()=>{setOrders(ctx.adminOrders||[]);},[ctx.adminOrders]);

  const visible=orders.filter(o=>{
    const matchS=statusFilter==='All'||o.status===statusFilter.toLowerCase();
    const matchC=couponFilter==='All'||(couponFilter==='With Coupon'&&o.coupon_code)||(couponFilter==='No Coupon'&&!o.coupon_code);
    const q=search.toLowerCase();
    const matchQ=!q||(o.customer_name||'').toLowerCase().includes(q)||(o.customer_phone||'').includes(search);
    return matchS&&matchC&&matchQ;
  });

  async function updateStatus(orderId,newSt){
    try{await window.mpApi.fetch(`/admin/orders/${orderId}/status`,{method:'PATCH',body:JSON.stringify({status:newSt})});}catch(_){}
    setOrders(prev=>prev.map(o=>o.id===orderId?{...o,status:newSt}:o));
    if(detail?.id===orderId)setDetail(d=>({...d,status:newSt}));
    setCancelConfirm(false);
    if(newSt==='cancelled'){setDetail(null);}
  }

  function openDetail(o){setDetail(o);setEditMode(false);setEditFields({total:o.total,phone:o.customer_phone||''});setCancelConfirm(false);}

  function saveEdit(){
    const updated={...detail,total:parseFloat(editFields.total)||detail.total,customer_phone:editFields.phone};
    setOrders(prev=>prev.map(o=>o.id===detail.id?updated:o));
    setDetail(updated);setEditMode(false);
  }

  function addOrderItem(productId){
    const p=(ctx.adminProducts||[]).find(x=>x.id===productId);
    if(!p)return;
    setNewOrder(f=>{
      const existing=f.orderItems.find(x=>x.id===productId);
      if(existing)return{...f,orderItems:f.orderItems.map(it=>it.id===productId?{...it,qty:(parseInt(it.qty)||1)+1}:it)};
      return{...f,orderItems:[...f.orderItems,{id:p.id,name:p.name,qty:1,unit_price:parseFloat(p.price)||0}]};
    });
  }

  function removeOrderItem(idx){
    setNewOrder(f=>({...f,orderItems:f.orderItems.filter((_,i)=>i!==idx)}));
  }

  function updateOrderItemQty(idx,delta){
    setNewOrder(f=>({...f,orderItems:f.orderItems.map((it,i)=>i===idx?{...it,qty:Math.max(1,(parseInt(it.qty)||1)+delta)}:it)}));
  }

  async function applyCoupon(){
    if(!newOrder.coupon)return;
    const sub=newOrder.orderItems.reduce((s,it)=>s+it.unit_price*(parseInt(it.qty)||1),0);
    setCouponApplying(true);
    try{
      const res=await window.mpApi.fetch(`/admin/coupons/validate?code=${encodeURIComponent(newOrder.coupon)}&subtotal=${sub}`);
      if(res?.ok){
        setNewOrder(f=>({...f,couponDiscount:res.data.discount,couponState:'ok',couponError:''}));
      }else{
        setNewOrder(f=>({...f,couponDiscount:0,couponState:'error',couponError:res?.error?.message||'Invalid coupon'}));
      }
    }catch(_){
      setNewOrder(f=>({...f,couponDiscount:0,couponState:'error',couponError:'Failed to validate'}));
    }
    setCouponApplying(false);
  }

  async function submitManualOrder(){
    if(!newOrder.customer||!newOrder.phone||!newOrder.orderItems.length)return;
    const sub=newOrder.orderItems.reduce((s,it)=>s+it.unit_price*(parseInt(it.qty)||1),0);
    try{
      const res=await window.mpApi.fetch('/admin/orders',{
        method:'POST',
        body:JSON.stringify({
          customer_name:newOrder.customer,
          customer_phone:newOrder.phone,
          address:newOrder.address||undefined,
          items:newOrder.orderItems.map(it=>({id:it.id,name:it.name,qty:parseInt(it.qty)||1,unit_price:it.unit_price})),
          payment_type:newOrder.payment,
          coupon_code:newOrder.coupon||undefined,
          discount_amount:newOrder.couponDiscount,
          status:newOrder.status,
          notes:newOrder.notes||undefined,
        }),
      });
      if(res?.ok&&res.data)setOrders(prev=>[res.data,...prev]);
    }catch(_){}
    setNewOrder(emptyOrder);setProdPickerOpen(false);setNewOrderSheet(false);
  }

  const lbl=s=>s.charAt(0).toUpperCase()+s.slice(1);

  return(
    <div style={{padding:'24px 0 0'}}>
      <RowBetween style={{padding:'0 16px',marginBottom:12}}>
        <div style={{...sans,fontSize:20,fontWeight:700,color:C.text}}>Orders</div>
        <OrangeBtn onClick={()=>setNewOrderSheet(true)} style={{padding:'8px 14px',fontSize:12}}>
          <Ic n="plus" size={14} color={C.card}/>New
        </OrangeBtn>
      </RowBetween>

      <div style={{padding:'0 16px',marginBottom:8}}>
        <DarkInput value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search customer or phone…"/>
      </div>
      <div style={{display:'flex',gap:8,overflowX:'auto',padding:'0 16px 6px',scrollbarWidth:'none'}}>
        {['All','Processing','Packed','Shipped','Delivered','Cancelled'].map(f=>(
          <Pill key={f} label={f} active={statusFilter===(f==='All'?'All':f.toLowerCase())} onClick={()=>setStatusFilter(f==='All'?'All':f.toLowerCase())}/>
        ))}
      </div>
      <div style={{display:'flex',gap:8,overflowX:'auto',padding:'0 16px 12px',scrollbarWidth:'none'}}>
        {['All','With Coupon','No Coupon'].map(f=>(
          <Pill key={f} label={f} active={couponFilter===f} onClick={()=>setCouponFilter(f)}/>
        ))}
      </div>

      <div style={{padding:'0 16px'}}>
        {visible.length===0?(
          <EmptyState icon="package" title="No orders found"/>
        ):visible.map(o=>(
          <div key={o.id} onClick={()=>openDetail(o)}
            style={{background:C.card,borderRadius:12,marginBottom:10,border:`1px solid ${C.borderCard}`,padding:'14px 16px',cursor:'pointer'}}>
            <RowBetween style={{marginBottom:4}}>
              <span style={{...mono,fontSize:10,color:'rgba(247,227,201,0.5)'}}>{o.order_ref}</span>
              <span style={{...sans,fontSize:11,color:'rgba(247,227,201,0.5)'}}>{fmtDate(o.created_at)}</span>
            </RowBetween>
            <div style={{...sans,fontSize:14,fontWeight:700,color:C.textCard,marginBottom:4}}>{o.customer_name}</div>
            <div style={{...sans,fontSize:12,color:C.mutedCard,marginBottom:8,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{orderSummary(o.items)}</div>
            <RowBetween>
              <Row style={{gap:8}}>
                <span style={{...mono,fontSize:14,fontWeight:700,color:C.orange}}>৳{o.total}</span>
                {o.coupon_code&&<span style={{...mono,fontSize:9,color:C.blue,background:'rgba(100,181,246,0.1)',padding:'2px 6px',borderRadius:4}}>{o.coupon_code}</span>}
              </Row>
              <Row><Badge status={o.status}/><Ic n="chevright" size={14} color='rgba(247,227,201,0.4)'/></Row>
            </RowBetween>
          </div>
        ))}
      </div>
      <div style={{height:100}}/>

      {detail&&(
        <BottomSheet onClose={()=>{setDetail(null);setEditMode(false);setCancelConfirm(false);}}>
          <div style={{...mono,fontSize:10,color:C.orange,letterSpacing:'0.15em',marginBottom:4}}>{detail.order_ref}</div>
          <div style={{...sans,fontSize:18,fontWeight:700,color:C.textCard,marginBottom:16}}>{detail.customer_name}</div>

          {!editMode&&!cancelConfirm&&(<>
            <Col style={{gap:10,marginBottom:16}}>
              <RowBetween><span style={{...sans,fontSize:13,color:C.mutedCard}}>Items</span><span style={{...sans,fontSize:13,color:C.textCard,textAlign:'right',maxWidth:200}}>{orderSummary(detail.items)}</span></RowBetween>
              <RowBetween><span style={{...sans,fontSize:13,color:C.mutedCard}}>Total</span><span style={{...mono,fontSize:15,fontWeight:700,color:C.orange}}>৳{detail.total}</span></RowBetween>
              <RowBetween><span style={{...sans,fontSize:13,color:C.mutedCard}}>Phone</span><span style={{...sans,fontSize:13,color:C.textCard}}>{detail.customer_phone||'—'}</span></RowBetween>
              <RowBetween><span style={{...sans,fontSize:13,color:C.mutedCard}}>Payment</span><span style={{...sans,fontSize:13,color:C.textCard}}>{detail.payment_type||'—'}</span></RowBetween>
              {detail.coupon_code&&<RowBetween><span style={{...sans,fontSize:13,color:C.mutedCard}}>Coupon</span><span style={{...mono,fontSize:13,color:C.blue}}>{detail.coupon_code}</span></RowBetween>}
              <RowBetween><span style={{...sans,fontSize:13,color:C.mutedCard}}>Date</span><span style={{...sans,fontSize:13,color:C.textCard}}>{fmtDate(detail.created_at)}</span></RowBetween>
              <RowBetween><span style={{...sans,fontSize:13,color:C.mutedCard}}>Status</span><Badge status={detail.status}/></RowBetween>
            </Col>
            <div style={{height:1,background:C.borderCard,marginBottom:16}}/>
            {detail.status!=='cancelled'&&detail.status!=='delivered'&&(
              <Col style={{gap:8,marginBottom:12}}>
                {(detail.status==='processing'||detail.status==='confirmed')&&(
                  <OrangeBtn full onClick={()=>updateStatus(detail.id,'packed')}>Mark as Packaged</OrangeBtn>
                )}
                {detail.status==='packed'&&(
                  <OrangeBtn full onClick={()=>updateStatus(detail.id,'shipped')}>Hand to Delivery Service</OrangeBtn>
                )}
                {detail.status==='shipped'&&(
                  <div style={{...sans,fontSize:12,color:C.blue,padding:'10px 14px',background:'rgba(100,181,246,0.1)',borderRadius:8}}>
                    Tracking will auto-update via the delivery service API.
                  </div>
                )}
                <GhostBtn full onClick={()=>setEditMode(true)}><Ic n="pencil" size={14} color={C.mutedCard}/>Edit Order</GhostBtn>
              </Col>
            )}
            {detail.status!=='cancelled'&&(
              <GhostBtn full onClick={()=>setCancelConfirm(true)} style={{color:C.red,borderColor:'rgba(229,115,115,0.3)'}}>
                <Ic n="x" size={14} color={C.red}/>Cancel Order
              </GhostBtn>
            )}
          </>)}

          {editMode&&(<>
            <div style={{...sans,fontSize:14,fontWeight:700,color:C.textCard,marginBottom:12}}>Edit Order</div>
            <Col style={{gap:10,marginBottom:16}}>
              <div>
                <div style={{...mono,fontSize:9,color:C.mutedCard,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:6}}>Total (৳)</div>
                <DarkInput value={editFields.total} onChange={e=>setEditFields(f=>({...f,total:e.target.value}))} placeholder="0"/>
              </div>
              <div>
                <div style={{...mono,fontSize:9,color:C.mutedCard,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:6}}>Customer Phone</div>
                <DarkInput value={editFields.phone} onChange={e=>setEditFields(f=>({...f,phone:e.target.value}))} placeholder="01XXXXXXXXX"/>
              </div>
            </Col>
            <Col style={{gap:8}}>
              <OrangeBtn full onClick={saveEdit}>Save Changes</OrangeBtn>
              <GhostBtn full onClick={()=>setEditMode(false)}>Cancel Edit</GhostBtn>
            </Col>
          </>)}

          {cancelConfirm&&(<>
            <div style={{...sans,fontSize:15,fontWeight:700,color:C.textCard,marginBottom:8}}>Cancel this order?</div>
            <div style={{...sans,fontSize:13,color:C.mutedCard,marginBottom:20,lineHeight:1.5}}>
              {detail.customer_name} will be notified. This cannot be undone.
            </div>
            <Col style={{gap:8}}>
              <GhostBtn full onClick={()=>updateStatus(detail.id,'cancelled')} style={{color:C.red,borderColor:'rgba(229,115,115,0.3)'}}>Yes, Cancel Order</GhostBtn>
              <GhostBtn full onClick={()=>setCancelConfirm(false)}>Keep Order</GhostBtn>
            </Col>
          </>)}
        </BottomSheet>
      )}

      {newOrderSheet&&(
        <BottomSheet onClose={()=>{setNewOrderSheet(false);setProdPickerOpen(false);}} title="New Manual Order">
          <div style={{...sans,fontSize:12,color:C.orange,background:'rgba(255,145,0,0.1)',border:'1px solid rgba(255,145,0,0.2)',borderRadius:8,padding:'10px 12px',marginBottom:16}}>
            Use this for orders placed via phone, WhatsApp, or in person.
          </div>
          <Col style={{gap:12}}>
            <div>
              <div style={{...mono,fontSize:9,color:C.mutedCard,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:6}}>Customer Name *</div>
              <DarkInput value={newOrder.customer} onChange={e=>setNewOrder(f=>({...f,customer:e.target.value}))} placeholder="Full name"/>
            </div>
            <div>
              <div style={{...mono,fontSize:9,color:C.mutedCard,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:6}}>Phone <span style={{color:C.red}}>*</span></div>
              <DarkInput value={newOrder.phone} onChange={e=>setNewOrder(f=>({...f,phone:e.target.value}))} placeholder="01XXXXXXXXX"/>
            </div>
            <div>
              <div style={{...mono,fontSize:9,color:C.mutedCard,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:6}}>Delivery Address</div>
              <DarkInput value={newOrder.address} onChange={e=>setNewOrder(f=>({...f,address:e.target.value}))} placeholder="House, Road, Area, City"/>
            </div>
            <div>
              <div style={{...mono,fontSize:9,color:C.mutedCard,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:6}}>Products *</div>
              <button
                onClick={()=>setProdPickerOpen(v=>!v)}
                style={{width:'100%',background:C.cardAlt,color:C.mutedCard,border:`1px solid rgba(247,227,201,${prodPickerOpen?'0.35':'0.15'})`,borderRadius:prodPickerOpen?'8px 8px 0 0':8,padding:'10px 12px',fontSize:13,...sans,outline:'none',display:'flex',alignItems:'center',justifyContent:'space-between',cursor:'pointer',textAlign:'left'}}
              >
                <span>— Select a product —</span>
                <span style={{fontSize:9,color:C.mutedCard,transform:prodPickerOpen?'rotate(180deg)':'none',transition:'transform 150ms',display:'inline-block'}}>▼</span>
              </button>
              {prodPickerOpen&&(
                <div style={{background:C.cardAlt,border:`1px solid rgba(247,227,201,0.2)`,borderTop:'none',borderRadius:'0 0 8px 8px',maxHeight:160,overflowY:'auto'}}>
                  {(ctx.adminProducts||[]).length===0?(
                    <div style={{padding:'10px 12px',...sans,fontSize:13,color:C.mutedCard}}>No products added yet</div>
                  ):(ctx.adminProducts||[]).map(p=>(
                    <button key={p.id} onClick={()=>{addOrderItem(p.id);setProdPickerOpen(false);}} style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between',textAlign:'left',padding:'10px 12px',background:'none',border:'none',borderBottom:`1px solid rgba(247,227,201,0.08)`,color:newOrder.orderItems.some(x=>x.id===p.id)?C.orange:C.textCard,fontSize:13,...sans,cursor:'pointer'}}>
                      <span>{p.name}</span>

                      </span>
                    </button>
                  ))}
                </div>
              )}
              {newOrder.orderItems.length>0&&(
                <div style={{marginTop:8,display:'flex',flexDirection:'column',gap:6}}>
                  {newOrder.orderItems.map((it,idx)=>{
                    const qty=parseInt(it.qty)||1;
                    const qBtnStyle={width:28,height:28,borderRadius:6,background:'rgba(247,227,201,0.1)',border:'1px solid rgba(247,227,201,0.18)',color:C.textCard,fontSize:18,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1,flexShrink:0,fontWeight:400};
                    return(
                      <div key={it.id} style={{display:'flex',alignItems:'center',gap:8,background:C.cardAlt,borderRadius:8,padding:'8px 10px'}}>
                        <span style={{flex:1,...sans,fontSize:13,color:C.textCard}}>{it.name}</span>

                        <button onClick={()=>updateOrderItemQty(idx,-1)} style={qBtnStyle}>−</button>
                        <span style={{...mono,fontSize:13,color:C.textCard,minWidth:22,textAlign:'center'}}>{qty}</span>
                        <button onClick={()=>updateOrderItemQty(idx,1)} style={qBtnStyle}>+</button>
                        <button onClick={()=>removeOrderItem(idx)} style={{background:'none',border:'none',color:C.mutedCard,cursor:'pointer',padding:4,fontSize:14,lineHeight:1,flexShrink:0}}>×</button>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
            {(()=>{
              const sub=newOrder.orderItems.reduce((s,it)=>s+it.unit_price*(parseInt(it.qty)||1),0);
              const total=Math.max(0,sub-newOrder.couponDiscount);
              return newOrder.orderItems.length>0&&(
                <div style={{background:'rgba(247,227,201,0.05)',border:'1px solid rgba(247,227,201,0.1)',borderRadius:10,padding:'12px 14px'}}>
                  <RowBetween style={{marginBottom:newOrder.couponDiscount>0?8:0}}>
                    <span style={{...sans,fontSize:13,color:C.mutedCard}}>Subtotal</span>
                    <span style={{...mono,fontSize:13,color:C.textCard}}>৳{sub.toFixed(2)}</span>
                  </RowBetween>
                  {newOrder.couponDiscount>0&&(
                    <RowBetween style={{marginBottom:8}}>
                      <span style={{...sans,fontSize:13,color:C.green}}>Coupon ({newOrder.coupon})</span>
                      <span style={{...mono,fontSize:13,color:C.green}}>−৳{newOrder.couponDiscount.toFixed(2)}</span>
                    </RowBetween>
                  )}
                  <div style={{height:1,background:'rgba(247,227,201,0.1)',marginBottom:8}}/>
                  <RowBetween>
                    <span style={{...sans,fontSize:14,fontWeight:700,color:C.textCard}}>Total</span>
                    <span style={{...mono,fontSize:16,fontWeight:700,color:C.orange}}>৳{total.toFixed(2)}</span>
                  </RowBetween>
                </div>
              );
            })()}
            <div>
              <div style={{...mono,fontSize:9,color:C.mutedCard,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:6}}>Coupon Code</div>
              <Row style={{gap:8}}>
                <div style={{flex:1}}>
                  <DarkInput value={newOrder.coupon} onChange={e=>setNewOrder(f=>({...f,coupon:e.target.value.toUpperCase(),couponDiscount:0,couponState:null,couponError:''}))} placeholder="Optional"/>
                </div>
                <OrangeBtn onClick={applyCoupon} disabled={!newOrder.coupon||couponApplying||!newOrder.orderItems.length} style={{padding:'0 16px',height:48,fontSize:13,flexShrink:0,borderRadius:8}}>
                  {couponApplying?'…':'Apply'}
                </OrangeBtn>
              </Row>
              {newOrder.couponState==='ok'&&<div style={{...sans,fontSize:11,color:C.green,marginTop:5}}>✓ Applied — saving ৳{newOrder.couponDiscount.toFixed(2)}</div>}
              {newOrder.couponState==='error'&&<div style={{...sans,fontSize:11,color:C.red,marginTop:5}}>✗ {newOrder.couponError||'Invalid coupon'}</div>}
            </div>
            <div>
              <div style={{...mono,fontSize:9,color:C.mutedCard,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:8}}>Payment Method</div>
              <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                {['bKash','Nagad','Rocket','Cash','Card','Bank Transfer'].map(m=>(
                  <Pill key={m} label={m} active={newOrder.payment===m} onClick={()=>setNewOrder(f=>({...f,payment:m}))}/>
                ))}
              </div>
            </div>
            <div>
              <div style={{...mono,fontSize:9,color:C.mutedCard,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:8}}>Initial Status</div>
              <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                {['processing','packed','shipped','delivered'].map(s=>(
                  <Pill key={s} label={lbl(s)} active={newOrder.status===s} onClick={()=>setNewOrder(f=>({...f,status:s}))}/>
                ))}
              </div>
            </div>
            <div>
              <div style={{...mono,fontSize:9,color:C.mutedCard,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:6}}>Internal Notes</div>
              <DarkInput value={newOrder.notes} onChange={e=>setNewOrder(f=>({...f,notes:e.target.value}))} placeholder="e.g. Customer prefers evening delivery"/>
            </div>
            <OrangeBtn full onClick={submitManualOrder} disabled={!newOrder.customer||!newOrder.phone||!newOrder.orderItems.length}>Create Order</OrangeBtn>
            <GhostBtn full onClick={()=>{setNewOrderSheet(false);setProdPickerOpen(false);}}>Cancel</GhostBtn>
          </Col>
        </BottomSheet>
      )}
    </div>
  );
}

function AdminCouponsTab(){
  const ctx=useContext(MobileCtx);
  const [tab,setTab]=useState('Festival');
  const [coupons,setCoupons]=useState([]);
  const [showForm,setShowForm]=useState(false);
  const emptyForm={code:'',type:'Percentage',value:'',minOrder:'',cap:'',perAccount:'1',expiry:''};

  useEffect(()=>{
    if((ctx.adminInfluencers||[]).length>0)return;
    window.mpApi.fetch('/admin/influencers').then(res=>{
      if(res?.data?.influencers?.length)ctx.setAdminInfluencers(res.data.influencers);
    }).catch(()=>{});
  },[]);

  async function toggleInfluencerCoupon(code){
    const res=await window.mpApi.fetch(`/admin/coupons/${code}/toggle`,{method:'PATCH'});
    if(res?.ok&&res?.data){
      ctx.setAdminInfluencers(prev=>prev.map(c=>c.code===code?{...c,is_active:res.data.is_active}:c));
    }else if(res){
      alert(res?.error?.message||res?.message||'Failed to toggle coupon.');
    }
  }

  return(
    <div style={{padding:'24px 16px 0'}}>
      <div style={{...sans,fontSize:20,fontWeight:700,color:C.text,marginBottom:16}}>Coupons</div>
      <div style={{display:'flex',gap:8,marginBottom:16}}>
        {['Festival','Crew','Influencer'].map(t=><Pill key={t} label={t} active={tab===t} onClick={()=>setTab(t)}/>)}
      </div>

      {tab==='Festival'&&(<>
        <Card style={{marginBottom:12}}>
          <RowBetween style={{cursor:'pointer'}} onClick={()=>setShowForm(!showForm)}>
            <div style={{...sans,fontSize:13,fontWeight:700,color:C.textCard}}>Create Coupon</div>
            <Ic n={showForm?'chevup':'chevdown'} size={16} color={C.mutedCard}/>
          </RowBetween>
          {showForm&&(
            <Col style={{marginTop:12,gap:10}}>
              <DarkInput value={form.code} onChange={e=>setForm(f=>({...f,code:e.target.value.toUpperCase()}))} placeholder="e.g. SUMMER25"/>

                <div style={{...mono,fontSize:9,color:C.mutedCard,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:8}}>Type</div>
                <div style={{display:'flex',gap:6}}>
                  {['Percentage','Flat amount'].map(t=>(
                    <Pill key={t} label={t} active={form.type===t} onClick={()=>setForm(f=>({...f,type:t}))}/>
                  ))}
                </div>
              </div>
              <DarkInput value={form.value} onChange={e=>setForm(f=>({...f,value:e.target.value}))} placeholder={form.type==='Percentage'?'Discount % (e.g. 15)':'Flat amount (৳)'}/>

              <Row style={{gap:8}}>
                <div style={{flex:1}}>
                  <div style={{...mono,fontSize:9,color:C.mutedCard,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:6}}>Usage Cap</div>
                  <DarkInput value={form.cap} onChange={e=>setForm(f=>({...f,cap:e.target.value}))} placeholder="e.g. 100"/>
                </div>
                <div style={{flex:1}}>
                  <div style={{...mono,fontSize:9,color:C.mutedCard,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:6}}>Per-account Limit</div>
                  <DarkInput value={form.perAccount} onChange={e=>setForm(f=>({...f,perAccount:e.target.value}))} placeholder="1"/>
                </div>
              </Row>
              <div>
                <div style={{...mono,fontSize:9,color:C.mutedCard,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:6}}>Expiry Date</div>

                    padding:'12px 14px',color:C.textCard,fontFamily:'inherit',fontSize:14,outline:'none'}}/>
              </div>
              <Row style={{gap:8}}>
                <OrangeBtn onClick={()=>{
                  if(!form.code||!form.value)return;
                  setCoupons(prev=>[...prev,{...form,used:0,active:true}]);
                  setForm(emptyForm);setShowForm(false);
                }}>Create</OrangeBtn>
                <GhostBtn onClick={()=>setShowForm(false)}>Cancel</GhostBtn>
              </Row>
            </Col>
          )}
        </Card>
        {coupons.length===0?(
          <EmptyState icon="tag" title="No coupons yet" body="Create your first festival coupon above."/>
        ):coupons.map((c,i)=>(
          <Card key={i} style={{marginBottom:8}}>
            <RowBetween style={{marginBottom:6}}>
              <span style={{...mono,fontSize:16,fontWeight:700,color:C.orange,letterSpacing:2}}>{c.code}</span>
              <span style={{...mono,fontSize:9,background:c.active?C.greenFaint:'rgba(247,227,201,0.1)',color:c.active?C.green:C.mutedCard,padding:'3px 8px',borderRadius:99}}>{c.active?'ACTIVE':'INACTIVE'}</span>

      {tab==='Crew'&&<EmptyState icon="users" title="Crew codes coming soon" body="Crew referral codes will appear here once the crew backend is built."/>}
      {tab==='Influencer'&&(
        (ctx.adminInfluencers||[]).length===0?(
          <EmptyState icon="bolt" title="No influencer codes yet" body="Add influencers from the More → Influencers tab. Their promo codes will appear here automatically."/>
        ):(ctx.adminInfluencers||[]).map((c,i)=>(
          <Card key={c.id||i} style={{marginBottom:8}}>
            <RowBetween style={{marginBottom:6}}>
              <span style={{...mono,fontSize:16,fontWeight:700,color:C.orange,letterSpacing:2}}>{c.code}</span>
              <span style={{...mono,fontSize:9,background:c.is_active!==false?C.greenFaint:'rgba(247,227,201,0.1)',color:c.is_active!==false?C.green:C.mutedCard,padding:'3px 8px',borderRadius:99}}>{c.is_active!==false?'ACTIVE':'INACTIVE'}</span>
            </RowBetween>
            <div style={{...sans,fontSize:12,color:C.mutedCard,marginBottom:10}}>
              {c.name} · {c.comm_rate||15}% commission
              {(c.total_owed||0)>0&&<span style={{color:C.orange,marginLeft:6}}>৳{c.total_owed} owed</span>}

              style={{width:'100%',background:C.cardAlt,border:'1px solid rgba(247,227,201,0.15)',borderRadius:8,
                padding:'12px 14px',color:C.textCard,fontFamily:'inherit',fontSize:14,outline:'none'}}/>
          </div>
          <RowBetween>
            <span style={{...sans,fontSize:13,color:C.textCard}}>Two-Factor Authentication</span>
            <span style={{...mono,fontSize:10,background:C.greenFaint,color:C.green,padding:'3px 8px',borderRadius:99}}>ENABLED</span>
          </RowBetween>
          <OrangeBtn full>Update Account</OrangeBtn>
        </Col>
      </Card>
      <div style={{height:100}}/>
    </div>
  );
}

function AdminInfluencersTab(){
  const ctx=useContext(MobileCtx);
  const influencers=ctx.adminInfluencers||[];
  const setInfluencers=ctx.setAdminInfluencers;

  useEffect(()=>{
    if(influencers.length>0)return;
    window.mpApi.fetch('/admin/influencers').then(res=>{
      if(res?.data?.influencers?.length)setInfluencers(res.data.influencers);
    }).catch(()=>{});
  },[]);

  const [createSheet,setCreateSheet]=useState(false);
  const [viewSheet,setViewSheet]=useState(null);
  const [saving,setSaving]=useState(false);
  const emptyForm={name:'',email:'',phone:'',code:'',commRate:'15',notes:''};
  const [form,setForm]=useState(emptyForm);

  async function submit(){
    if(!form.name||!form.email||!form.code)return;
    setSaving(true);
    try{
      const res=await window.mpApi.fetch('/admin/influencers',{
        method:'POST',
        body:JSON.stringify({
          name:form.name,email:form.email,phone:form.phone||undefined,
          code:form.code.toUpperCase(),comm_rate:parseFloat(form.commRate)||15,
          notes:form.notes||undefined,
        }),
      });
      setInfluencers(prev=>[res.data,...prev]);
    }catch(e){alert(e?.message||'Failed to save influencer.');}
    finally{setSaving(false);}
    setForm(emptyForm);setCreateSheet(false);
  }

  async function markPaid(id){
    try{
      await window.mpApi.fetch(`/admin/influencers/${id}/paid`,{method:'PATCH'});
      setInfluencers(prev=>prev.map(c=>c.id===id?{...c,total_owed:0}:c));
      if(viewSheet?.id===id)setViewSheet(v=>({...v,total_owed:0}));
    }catch(_){}
  }

  return(
    <div style={{padding:'24px 16px 0'}}>
      <RowBetween style={{marginBottom:16}}>
        <div style={{...sans,fontSize:20,fontWeight:700,color:C.text}}>Influencers</div>
        <OrangeBtn onClick={()=>setCreateSheet(true)} style={{padding:'8px 14px',fontSize:12}}>
          <Ic n="plus" size={14} color={C.card}/>Add
        </OrangeBtn>
      </RowBetween>
      {influencers.length===0?(
        <EmptyState icon="bolt" title="No influencers yet" body="Add influencers to track their codes and commissions."/>
      ):influencers.map((c,i)=>(
        <Card key={c.id||i} style={{marginBottom:8}} onClick={()=>setViewSheet(c)}>
          <RowBetween style={{marginBottom:6}}>
            <span style={{...sans,fontSize:14,fontWeight:700,color:C.textCard}}>{c.name}</span>
            <span style={{...mono,fontSize:13,fontWeight:700,color:C.orange}}>{c.code}</span>
          </RowBetween>
          <RowBetween>
            <div style={{...sans,fontSize:12,color:C.mutedCard}}>{c.comm_rate||15}% commission · {c.email}</div>
            <span style={{...mono,fontSize:11,fontWeight:700,color:(c.total_owed||0)>0?C.orange:C.green}}>
              {(c.total_owed||0)>0?`৳${c.total_owed} owed`:'Paid'}
            </span>
          </RowBetween>
        </Card>
      ))}
      <div style={{height:100}}/>

      {createSheet&&(
        <BottomSheet onClose={()=>setCreateSheet(false)} title="Add Influencer">
          <div style={{...sans,fontSize:12,color:C.orange,background:'rgba(255,145,0,0.1)',border:'1px solid rgba(255,145,0,0.2)',borderRadius:8,padding:'10px 12px',marginBottom:16}}>
            Influencer will be saved to the database. Their promo code is auto-registered as a coupon.
          </div>
          <Col style={{gap:10}}>
            <DarkInput value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="Full name *"/>
            <DarkInput value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))} placeholder="Email address *"/>
            <DarkInput value={form.phone} onChange={e=>setForm(f=>({...f,phone:e.target.value}))} placeholder="Phone number"/>
            <Row style={{gap:8}}>
              <div style={{flex:1}}>
                <DarkInput value={form.code} onChange={e=>setForm(f=>({...f,code:e.target.value.toUpperCase()}))} placeholder="Promo code * (e.g. SADIA20)" style={{...mono,letterSpacing:'0.08em'}}/>
              </div>
              <div style={{width:88}}>
                <DarkInput value={form.commRate} onChange={e=>setForm(f=>({...f,commRate:e.target.value}))} placeholder="Rate %"/>
              </div>
            </Row>
            <DarkInput value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="Notes (platform, audience, niche…)"/>
            <OrangeBtn full onClick={submit} disabled={saving||!form.name||!form.email||!form.code}>{saving?'Saving…':'Create Account'}</OrangeBtn>
            <GhostBtn full onClick={()=>setCreateSheet(false)}>Cancel</GhostBtn>
          </Col>
        </BottomSheet>
      )}

      {viewSheet&&(
        <BottomSheet onClose={()=>setViewSheet(null)} title={viewSheet.name}>
          <Col style={{gap:10,marginBottom:16}}>
            {viewSheet.email&&<RowBetween><span style={{...sans,fontSize:13,color:C.mutedCard}}>Email</span><span style={{...sans,fontSize:13,color:C.textCard}}>{viewSheet.email}</span></RowBetween>}
            {viewSheet.phone&&<RowBetween><span style={{...sans,fontSize:13,color:C.mutedCard}}>Phone</span><span style={{...sans,fontSize:13,color:C.textCard}}>{viewSheet.phone}</span></RowBetween>}
            <RowBetween><span style={{...sans,fontSize:13,color:C.mutedCard}}>Code</span><span style={{...mono,fontSize:14,fontWeight:700,color:C.orange}}>{viewSheet.code}</span></RowBetween>
            <RowBetween><span style={{...sans,fontSize:13,color:C.mutedCard}}>Commission Rate</span><span style={{...sans,fontSize:13,color:C.textCard}}>{viewSheet.comm_rate||15}%</span></RowBetween>
          </Col>
          <div style={{height:1,background:C.borderCard,marginBottom:16}}/>
          <div style={{...mono,fontSize:9,color:C.orange,letterSpacing:'0.2em',textTransform:'uppercase',marginBottom:10}}>This Month</div>
          <Col style={{gap:10,marginBottom:16}}>
            <RowBetween><span style={{...sans,fontSize:13,color:C.mutedCard}}>Orders</span><span style={{...sans,fontSize:13,color:C.textCard}}>{viewSheet.orders_mo||0}</span></RowBetween>
            <RowBetween><span style={{...sans,fontSize:13,color:C.mutedCard}}>Commission Earned</span><span style={{...mono,fontSize:15,fontWeight:700,color:C.orange}}>৳{viewSheet.comm_mo||0}</span></RowBetween>
            <RowBetween><span style={{...sans,fontSize:13,color:C.mutedCard}}>Total Owed</span>
              <span style={{...mono,fontSize:15,fontWeight:700,color:(viewSheet.total_owed||0)>0?C.orange:C.green}}>
                {(viewSheet.total_owed||0)>0?`৳${viewSheet.total_owed}`:'All paid'}
              </span>
            </RowBetween>
          </Col>
          {(viewSheet.total_owed||0)>0&&(
            <OrangeBtn full onClick={()=>markPaid(viewSheet.id)}>Mark Commission as Paid</OrangeBtn>
          )}
        </BottomSheet>
      )}
    </div>
  );
}

const PROD_STATUSES=['Active','New','Coming Soon','Stock Out','Featured','Discontinued'];

function AdminProductsTab(){
  const {adminProducts:products,setAdminProducts:setProducts}=useContext(MobileCtx);
  const [prodTab,setProdTab]=useState('Products');
  const [packages,setPackages]=useState([]);
  const [sheet,setSheet]=useState(null);
  const [pkgSheet,setPkgSheet]=useState(null);
  const [confirmDelete,setConfirmDelete]=useState(null);
  const emptyProd={name:'',description:'',price:'',stock:'',qty:'',unit:'g',status:'Active',images:[]};
  const emptyPkg={name:'',description:'',price:'',status:'Active',productIds:[],quantities:{}};
  const [form,setForm]=useState(emptyProd);
  const [pkgForm,setPkgForm]=useState(emptyPkg);
  const fileRef=useRef(null);
  const activeImgIdx=useRef(0);

  function handleImageChange(e){
    const file=e.target.files[0];
    if(!file){e.target.value='';return;}
    const idx=activeImgIdx.current;
    const reader=new FileReader();
    reader.onload=ev=>setForm(f=>{const imgs=[...(f.images||[])];imgs[idx]=ev.target.result;return{...f,images:imgs};});
    reader.readAsDataURL(file);e.target.value='';
  }

  async function saveProduct(){
    if(!form.name||!form.price||!(form.images?.length))return;
    const body={
      name:form.name,
      price:parseFloat(form.price)||0,
      stock:parseInt(form.stock)||0,
      status:form.status,
      images:form.images||[],
    };
    if(form.description)body.description=form.description;
    const qtyVal=parseInt(form.qty);
    if(qtyVal>0)body.qty=qtyVal;
    if(form.unit)body.unit=form.unit;
    try{
      let res;
      if(sheet.type==='add'){
        res=await window.mpApi.fetch('/admin/products',{method:'POST',body:JSON.stringify(body)});
        if(res?.data)setProducts(prev=>[res.data,...prev]);
      }else{
        res=await window.mpApi.fetch(`/admin/products/${sheet.data.id}`,{method:'PATCH',body:JSON.stringify(body)});
        if(res?.data)setProducts(prev=>prev.map(p=>p.id===sheet.data.id?res.data:p));
      }
    }catch(_){alert('Failed to save product.');return;}
    setSheet(null);
  }

  function toggleProdInPkg(id){
    setPkgForm(f=>{
      const has=f.productIds.includes(id);
      const ids=has?f.productIds.filter(x=>x!==id):[...f.productIds,id];
      const qty={...f.quantities};if(has)delete qty[id];else qty[id]=1;
      return{...f,productIds:ids,quantities:qty};
    });
  }

  function savePkg(){
    if(!pkgForm.name||!pkgForm.price)return;
    const entry={...pkgForm,price:parseFloat(pkgForm.price)||0,id:pkgSheet.data?.id||`PKG${Date.now()}`};
    if(pkgSheet.type==='add')setPackages(prev=>[...prev,entry]);
    else setPackages(prev=>prev.map(p=>p.id===pkgSheet.data.id?{...p,...entry}:p));
    setPkgSheet(null);
  }

  const mrpOf=pkg=>products.filter(p=>pkg.productIds.includes(p.id)).reduce((s,p)=>s+p.price*(pkg.quantities?.[p.id]||1),0);

  return(
    <div style={{padding:'24px 16px 0'}}>
      <RowBetween style={{marginBottom:12}}>
        <div style={{...sans,fontSize:20,fontWeight:700,color:C.text}}>Products</div>
        <OrangeBtn onClick={()=>{
          if(prodTab==='Products'){setForm(emptyProd);setSheet({type:'add'});}
          else{setPkgForm(emptyPkg);setPkgSheet({type:'add'});}
        }} style={{padding:'8px 14px',fontSize:12}}>
          <Ic n="plus" size={14} color={C.card}/>{prodTab==='Products'?'Add':'Package'}
        </OrangeBtn>
      </RowBetween>

      <div style={{display:'flex',gap:8,marginBottom:16}}>
        {['Products','Packages'].map(t=><Pill key={t} label={t} active={prodTab===t} onClick={()=>setProdTab(t)}/>)}
      </div>

      {prodTab==='Products'&&(
        products.length===0?(
          <EmptyState icon="coffee" title="No products yet" body="Click 'Add' to create your first product."/>
        ):products.map(p=>(
          <Card key={p.id} style={{marginBottom:8,padding:0,overflow:'hidden'}} onClick={()=>{setForm({...p,price:String(p.price),stock:String(p.stock),qty:p.qty?String(p.qty):'',unit:p.unit||'g',images:p.images||(p.image?[p.image]:[])});setSheet({type:'edit',data:p});}}>
            {(p.images?.[0]||p.image)&&(
              <img src={p.images?.[0]||p.image} alt={p.name} style={{width:'100%',height:120,objectFit:'cover'}}/>
            )}
            <div style={{padding:'12px 14px'}}>
              <RowBetween style={{marginBottom:4}}>
                <span style={{...sans,fontSize:14,fontWeight:700,color:C.textCard}}>{p.name}</span>
                <span style={{...mono,fontSize:13,fontWeight:700,color:C.orange}}>৳{p.price}</span>
              </RowBetween>
              <div style={{...sans,fontSize:12,color:C.mutedCard,marginBottom:4}}>{p.description||'—'}</div>
              <div style={{...sans,fontSize:11,color:C.mutedCard}}>Stock: {p.stock}{p.qty&&p.unit?` · ${p.qty}${p.unit}`:''} · {p.status}{p.images?.length>1?` · ${p.images.length} photos`:''}</div>
            </div>
          </Card>
        ))
      )}

      {prodTab==='Packages'&&(
        packages.length===0?(
          <EmptyState icon="package" title="No packages yet" body="Click 'Package' to create a bundle."/>
        ):packages.map(pkg=>{
          const included=products.filter(p=>pkg.productIds.includes(p.id));
          const mrp=mrpOf(pkg);
          const saving=mrp-pkg.price;
          return(
            <Card key={pkg.id} style={{marginBottom:8}} onClick={()=>{setPkgForm({...pkg,price:String(pkg.price),quantities:{...(pkg.quantities||{})}});setPkgSheet({type:'edit',data:pkg});}}>
              <RowBetween style={{marginBottom:6}}>
                <span style={{...sans,fontSize:14,fontWeight:700,color:C.textCard}}>{pkg.name}</span>
                <span style={{...mono,fontSize:13,fontWeight:700,color:C.orange}}>৳{pkg.price}</span>
              </RowBetween>
              <div style={{...sans,fontSize:12,color:C.mutedCard,marginBottom:6}}>{pkg.description||'—'}</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:4,marginBottom:6}}>
                {included.map(p=><span key={p.id} style={{...mono,fontSize:10,background:'rgba(247,227,201,0.08)',color:C.mutedCard,padding:'2px 7px',borderRadius:99}}>{p.name}{(pkg.quantities?.[p.id]||1)>1?` ×${pkg.quantities[p.id]}`:''}</span>)}
              </div>
              {saving>0&&<div style={{...sans,fontSize:11,color:C.green}}>Save ৳{saving} vs buying individually</div>}
            </Card>
          );
        })
      )}

      <div style={{height:100}}/>
      <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleImageChange}/>

      {sheet&&(
        <BottomSheet onClose={()=>setSheet(null)} title={sheet.type==='add'?'Add Product':'Edit Product'}>
          {!confirmDelete?(
            <Col style={{gap:10}}>
              <div>
                <div style={{...mono,fontSize:9,color:C.mutedCard,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:8}}>
                  Product Images <span style={{color:C.red}}>*</span>
                </div>
                <div style={{display:'flex',gap:8,overflowX:'auto',paddingBottom:4,scrollbarWidth:'none'}}>
                  {(form.images||[]).map((img,idx)=>(
                    <div key={idx} style={{position:'relative',flexShrink:0,width:72,height:72}}>
                      <img src={img} alt={`img${idx+1}`} style={{width:72,height:72,objectFit:'cover',borderRadius:10,border:'1px solid rgba(247,227,201,0.15)'}}/>
                      {idx===0&&<span style={{position:'absolute',bottom:0,left:0,right:0,background:'rgba(0,0,0,0.55)',color:'#fff',fontSize:8,textAlign:'center',padding:'2px 0',borderRadius:'0 0 10px 10px'}}>Main</span>}
                      <button onClick={()=>setForm(f=>({...f,images:f.images.filter((_,i)=>i!==idx)}))}
                        style={{position:'absolute',top:-6,right:-6,width:18,height:18,borderRadius:'50%',background:C.red,border:'none',color:'#fff',fontSize:11,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',padding:0,lineHeight:1}}>×</button>
                    </div>
                  ))}
                  {(form.images||[]).length<5&&(
                    <button onClick={()=>{activeImgIdx.current=(form.images||[]).length;fileRef.current?.click();}}
                      style={{flexShrink:0,width:72,height:72,borderRadius:10,border:'2px dashed rgba(247,227,201,0.2)',
                        background:C.cardAlt,cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:4}}>
                      <Ic n="plus" size={18} color='rgba(247,227,201,0.3)'/>
                      <span style={{...mono,fontSize:8,color:'rgba(247,227,201,0.3)'}}>{(form.images||[]).length===0?'Required':'Add'}</span>
                    </button>
                  )}
                </div>
                {(form.images||[]).length===0&&<div style={{...sans,fontSize:11,color:C.red,marginTop:6}}>At least 1 image is required.</div>}
              </div>
              <DarkInput value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="Product name *"/>
              <DarkInput value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} placeholder="Description"/>
              <Row style={{gap:8}}>
                <div style={{flex:1}}>
                  <div style={{...mono,fontSize:9,color:C.mutedCard,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:6}}>Price (৳) *</div>
                  <DarkInput value={form.price} onChange={e=>setForm(f=>({...f,price:e.target.value}))} placeholder="25"/>
                </div>
                <div style={{flex:1}}>
                  <div style={{...mono,fontSize:9,color:C.mutedCard,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:6}}>Stock</div>
                  <DarkInput value={form.stock} onChange={e=>setForm(f=>({...f,stock:e.target.value}))} placeholder="100"/>
                </div>
              </Row>
              <Row style={{gap:8}}>
                <div style={{flex:1}}>
                  <div style={{...mono,fontSize:9,color:C.mutedCard,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:6}}>Qty (integer)</div>
                  <input type="number" min="1" step="1" value={form.qty} onChange={e=>setForm(f=>({...f,qty:e.target.value}))} placeholder="e.g. 100"
                    style={{width:'100%',background:C.cardAlt,border:'1px solid rgba(247,227,201,0.15)',borderRadius:8,padding:'12px 14px',
                      color:C.textCard,...mono,fontSize:14,outline:'none'}}/>
                </div>
                <div style={{flexShrink:0}}>
                  <div style={{...mono,fontSize:9,color:C.mutedCard,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:6}}>Unit</div>
                  <select value={form.unit} onChange={e=>setForm(f=>({...f,unit:e.target.value}))}
                    style={{background:C.cardAlt,border:'1px solid rgba(247,227,201,0.15)',borderRadius:8,padding:'12px 10px',
                      color:C.textCard,...mono,fontSize:14,outline:'none',cursor:'pointer'}}>
                    {['g','kg','ml','L','pcs','sachets','pack'].map(u=><option key={u}>{u}</option>)}
                  </select>
                </div>
              </Row>
              <div>
                <div style={{...mono,fontSize:9,color:C.mutedCard,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:8}}>Status</div>
                <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                  {PROD_STATUSES.map(s=><Pill key={s} label={s} active={form.status===s} onClick={()=>setForm(f=>({...f,status:s}))}/>)}
                </div>
              </div>
              <OrangeBtn full onClick={saveProduct} disabled={!form.name||!form.price||!(form.images?.length)}>{sheet.type==='add'?'Add Product':'Save Changes'}</OrangeBtn>
              {sheet.type==='edit'&&(
                <GhostBtn full onClick={()=>setConfirmDelete(sheet.data)} style={{color:C.red,borderColor:'rgba(229,115,115,0.3)'}}>
                  <Ic n="trash" size={14} color={C.red}/>Delete Product
                </GhostBtn>
              )}
              <GhostBtn full onClick={()=>setSheet(null)}>Cancel</GhostBtn>
            </Col>
          ):(
            <>
              <div style={{...sans,fontSize:15,fontWeight:700,color:C.textCard,marginBottom:8}}>Delete "{confirmDelete.name}"?</div>
              <div style={{...sans,fontSize:13,color:C.mutedCard,marginBottom:20,lineHeight:1.5}}>
                This product will be permanently removed. Packages containing it will lose this item.
              </div>
              <Col style={{gap:8}}>
                <GhostBtn full onClick={async()=>{try{await window.mpApi.fetch(`/admin/products/${confirmDelete.id}`,{method:'DELETE'});}catch(_){}setProducts(prev=>prev.filter(p=>p.id!==confirmDelete.id));setConfirmDelete(null);setSheet(null);}} style={{color:C.red,borderColor:'rgba(229,115,115,0.3)'}}>Yes, Delete</GhostBtn>
                <GhostBtn full onClick={()=>setConfirmDelete(null)}>Keep Product</GhostBtn>
              </Col>
            </>
          )}
        </BottomSheet>
      )}

      {pkgSheet&&(
        <BottomSheet onClose={()=>setPkgSheet(null)} title={pkgSheet.type==='add'?'Create Package':'Edit Package'}>
          <Col style={{gap:10}}>
            <DarkInput value={pkgForm.name} onChange={e=>setPkgForm(f=>({...f,name:e.target.value}))} placeholder="Package name *"/>
            <DarkInput value={pkgForm.description} onChange={e=>setPkgForm(f=>({...f,description:e.target.value}))} placeholder="Description"/>
            <div>
              <div style={{...mono,fontSize:9,color:C.mutedCard,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:8}}>Include Products</div>

              ):products.map(p=>{
                const checked=pkgForm.productIds.includes(p.id);
                const qty=pkgForm.quantities?.[p.id]||1;
                return(
                  <div key={p.id} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 0',borderBottom:`1px solid ${C.borderCard}`}}>

                    <span style={{...sans,fontSize:13,color:C.textCard,flex:1}}>{p.name}</span>
                    {checked&&(
                      <input type="number" min="1" value={qty} onChange={e=>setPkgForm(f=>({...f,quantities:{...f.quantities,[p.id]:Math.max(1,parseInt(e.target.value)||1)}}))}
                        style={{width:48,background:'rgba(247,227,201,0.1)',border:'1px solid rgba(247,227,201,0.2)',borderRadius:6,padding:'4px 6px',color:C.textCard,fontFamily:'inherit',fontSize:13,textAlign:'center',outline:'none'}}/>
                    )}
                    <span style={{...mono,fontSize:11,color:C.mutedCard,flexShrink:0}}>৳{p.price}{checked&&qty>1?`×${qty}`:''}</span>
                  </div>
                );
              })}
            </div>
            {pkgForm.productIds.length>0&&(
              <div style={{background:'rgba(255,145,0,0.1)',border:'1px solid rgba(255,145,0,0.2)',borderRadius:8,padding:'10px 14px'}}>
                <div style={{...mono,fontSize:9,color:C.mutedCard,marginBottom:4}}>Individual total (MRP)</div>
                <div style={{...mono,fontSize:16,fontWeight:700,color:C.orange}}>৳{mrpOf(pkgForm)}</div>
              </div>
            )}
            <Row style={{gap:8}}>
              <div style={{flex:1}}>
                <div style={{...mono,fontSize:9,color:C.mutedCard,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:6}}>Bundle Price (৳) *</div>
                <DarkInput value={pkgForm.price} onChange={e=>setPkgForm(f=>({...f,price:e.target.value}))} placeholder="0"/>
              </div>
              <div style={{flex:1}}>
                <div style={{...mono,fontSize:9,color:C.mutedCard,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:6}}>Status</div>
                <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                  {['Active','New','Coming Soon'].map(s=><Pill key={s} label={s} active={pkgForm.status===s} onClick={()=>setPkgForm(f=>({...f,status:s}))}/>)}
                </div>
              </div>
            </Row>
            <OrangeBtn full onClick={savePkg} disabled={!pkgForm.name||!pkgForm.price}>{pkgSheet.type==='add'?'Create Package':'Save Package'}</OrangeBtn>
            {pkgSheet.type==='edit'&&(
              <GhostBtn full onClick={()=>{setPackages(prev=>prev.filter(p=>p.id!==pkgSheet.data.id));setPkgSheet(null);}} style={{color:C.red,borderColor:'rgba(229,115,115,0.3)'}}>Delete Package</GhostBtn>
            )}
            <GhostBtn full onClick={()=>setPkgSheet(null)}>Cancel</GhostBtn>
          </Col>
        </BottomSheet>
      )}
    </div>
  );
}

function AdminMoreTab({setTab,onLogout}){
  const moreLinks=[
    {label:'Customers',icon:'customers',tab:'customers'},
    {label:'Subscriptions',icon:'repeat',tab:'subscriptions'},
    {label:'Points & Redemptions',icon:'star',tab:'redemptions'},
    {label:'Influencers',icon:'bolt',tab:'influencers'},
    {label:'Products',icon:'coffee',tab:'products'},
    {label:'Financials',icon:'bar',tab:'financials'},
    {label:'Settings',icon:'settings',tab:'settings'},
  ];
  return(
    <div style={{padding:'24px 16px 0'}}>
      <div style={{...sans,fontSize:20,fontWeight:700,color:C.text,marginBottom:20}}>More</div>
      <Card style={{padding:0,overflow:'hidden',marginBottom:16}}>
        {moreLinks.map((l,i)=>(
          <button key={l.tab} onClick={()=>setTab(l.tab)} style={{width:'100%',display:'flex',alignItems:'center',gap:14,padding:'14px 16px',
            background:'none',border:'none',cursor:'pointer',borderBottom:i<moreLinks.length-1?`1px solid ${C.borderCard}`:'none',
            WebkitTapHighlightColor:'transparent'}}>
            <Ic n={l.icon} size={20} color={C.mutedCard}/>
            <span style={{...sans,fontSize:14,color:C.textCard,flex:1,textAlign:'left'}}>{l.label}</span>
            <Ic n="chevright" size={16} color={C.mutedCard}/>
          </button>
        ))}
      </Card>
      <GhostBtn full onClick={onLogout} style={{color:C.red,borderColor:'rgba(229,115,115,0.3)'}}>Sign Out</GhostBtn>
      <div style={{height:100}}/>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════════════════════ */

function useIsMobile(){
  const[m,setM]=useState(()=>typeof window!=='undefined'&&window.innerWidth<768);
  useEffect(()=>{
    const h=()=>setM(window.innerWidth<768);
    window.addEventListener('resize',h,{passive:true});
    return()=>window.removeEventListener('resize',h);
  },[]);
  return m;
}

function App(){
  const storedUser=localStorage.getItem('mp_user');
  const initUser=storedUser?JSON.parse(storedUser):null;
  const role=initUser?.role||null;

  const [adminProducts,setAdminProducts]=useState([]);
  const [adminInfluencers,setAdminInfluencers]=useState([]);
  const [ctxData,setCtxData]=useState({
    user:initUser,orders:[],addresses:[],paymentMethods:[],pointsHistory:[],
    adminStats:null,adminOrders:[],adminCustomers:[],
  });

  useEffect(()=>{
    if(!role)return;
    if(role==='admin'){
      Promise.all([
        window.mpApi.fetch('/admin/stats').catch(()=>null),
        window.mpApi.fetch('/admin/orders?limit=50').catch(()=>null),
        window.mpApi.fetch('/admin/customers?limit=50').catch(()=>null),
        window.mpApi.fetch('/me').catch(()=>null),
        window.mpApi.fetch('/admin/influencers').catch(()=>null),
        window.mpApi.fetch('/admin/products').catch(()=>null),
      ]).then(([statsRes,ordersRes,cusRes,meRes,infRes,prodsRes])=>{
        setCtxData(d=>({
          ...d,
          user:meRes?.data||d.user,
          adminStats:statsRes?.data||null,
          adminOrders:ordersRes?.data?.orders||[],
          adminCustomers:cusRes?.data?.customers||[],
        }));
        setAdminInfluencers(infRes?.data?.influencers||[]);
        setAdminProducts(prodsRes?.data?.products||[]);
      });
    } else {
      Promise.all([
        window.mpApi.fetch('/me').catch(()=>null),
        window.mpApi.fetch('/orders?limit=20').catch(()=>null),
        window.mpApi.fetch('/me/addresses').catch(()=>null),
        window.mpApi.fetch('/me/payment-methods').catch(()=>null),
        window.mpApi.fetch('/me/points-history?limit=20').catch(()=>null),
      ]).then(([meRes,ordersRes,addrRes,pmRes,ptsRes])=>{
        setCtxData(d=>({
          ...d,
          user:meRes?.data||d.user,
          orders:ordersRes?.data?.orders||[],
          addresses:Array.isArray(addrRes?.data)?addrRes.data:[],
          paymentMethods:Array.isArray(pmRes?.data)?pmRes.data:[],
          pointsHistory:Array.isArray(ptsRes?.data)?ptsRes.data:[],
        }));
      });
    }
  },[role]);

  function handleLogout(){window.mpApi.signOut();}

  const isMobile=useIsMobile();

  // All four dashboard hooks called unconditionally
  const userD=UserDashboard({onLogout:handleLogout});
  const crewD=CrewDashboard({onLogout:handleLogout});
  const inflD=InfluencerDashboard({onLogout:handleLogout});
  const adminD=AdminDashboard({onLogout:handleLogout});

  const dashMap={user:userD,crew:crewD,influencer:inflD,admin:adminD};
  const dash=role?dashMap[role]:null;
  const tabContent=role?(
    <div key={dash.tab} style={{animation:'fadeIn 150ms ease',minHeight:'100%'}}>{dash.content[dash.tab]}</div>
  ):null;

  if(isMobile){
    return(
      <MobileCtx.Provider value={{...ctxData,adminProducts,setAdminProducts,adminInfluencers,setAdminInfluencers}}>
        <div style={{
          position:'relative',width:'100%',flex:1,
          display:'flex',flexDirection:'column',
          background:C.bg,overflow:'hidden',
          paddingTop:'env(safe-area-inset-top,0px)',
        }}>
          {role&&(
            <>
              <div style={{flex:1,overflowY:'auto',overflowX:'hidden',minHeight:0,WebkitOverflowScrolling:'touch'}}>
                {tabContent}
              </div>
              <BottomNav role={dash.role} tab={dash.tab} setTab={dash.setTab} mobile/>
            </>
          )}
          {!role&&(
            <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',flexDirection:'column',gap:16}}>
              <img src="assets/logo.png" alt="Midnight Pick" style={{width:48,opacity:.6}}/>
              <div style={{...sans,fontSize:13,color:C.muted}}>Redirecting…</div>
            </div>
          )}
        </div>
      </MobileCtx.Provider>
    );
  }

  return(
    <MobileCtx.Provider value={ctxData}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'center'}}>
        <div style={{
          width:390,height:844,borderRadius:40,overflow:'hidden',
          boxShadow:'0 0 0 8px #3a1a0a, 0 32px 64px rgba(0,0,0,0.6)',
          display:'flex',flexDirection:'column',position:'relative',background:C.bg,
        }}>
          {role&&<StatusBar/>}
          <div style={{flex:1,overflowY:'auto',overflowX:'hidden',background:C.bg,minHeight:0}}>
            {role&&tabContent}
          </div>
          {role&&<BottomNav role={dash.role} tab={dash.tab} setTab={dash.setTab}/>}
        </div>
      </div>
    </MobileCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
