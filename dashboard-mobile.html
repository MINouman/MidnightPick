/* ── Shared Components ──────────────────────────────────── */
function Badge({status}){
  const map={
    Processing:{bg:C.orangeFaint,color:'#CC7300'},
    Shipped:{bg:C.blueFaint,color:C.blue},
    Delivered:{bg:C.greenFaint,color:C.green},
    Cancelled:{bg:C.redFaint,color:C.red},
    Active:{bg:C.greenFaint,color:C.green},
    Paused:{bg:'rgba(247,227,201,0.1)',color:C.mutedCard},
    Pending:{bg:C.orangeFaint,color:C.orange},
    Paid:{bg:C.greenFaint,color:C.green},
  };
  const m=map[status]||{bg:'rgba(247,227,201,0.1)',color:C.mutedCard};
  return(
    <span style={{...mono,fontSize:10,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',
      background:m.bg,color:m.color,padding:'3px 10px',borderRadius:99,display:'inline-flex',alignItems:'center'}}>
      {status}
    </span>
  );
}

function BottomSheet({children,onClose,title}){
  return(
    <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(44,24,16,0.65)',zIndex:200,display:'flex',alignItems:'flex-end'}}>
      <div onClick={e=>e.stopPropagation()} style={{width:'100%',background:C.card,borderRadius:'20px 20px 0 0',padding:'12px 16px 32px',animation:'slideUp 250ms ease-out',maxHeight:'90%',overflowY:'auto'}}>
        <div style={{width:40,height:4,background:'rgba(247,227,201,0.2)',borderRadius:2,margin:'0 auto 20px'}}/>
        {title&&<div style={{...sans,fontSize:17,fontWeight:700,color:C.textCard,marginBottom:12}}>{title}</div>}
        {children}
      </div>
    </div>
  );
}

function Toast({msg,type='success',onDone}){
  useEffect(()=>{const t=setTimeout(onDone,type==='error'?5000:3000);return()=>clearTimeout(t);},[]);
  const cfg={success:{bg:C.greenFaint,border:C.green,icon:'check'},error:{bg:C.redFaint,border:C.red,icon:'x'},info:{bg:C.orangeFaint,border:C.orange,icon:'alert'}};
  const c=cfg[type]||cfg.success;
  return(
    <div style={{position:'absolute',top:56,left:12,right:12,zIndex:300,borderRadius:12,padding:'12px 14px',
      background:c.bg,borderLeft:`2px solid ${c.border}`,display:'flex',alignItems:'center',gap:10,
      animation:'slideDown 200ms ease'}}>
      <Ic n={c.icon} size={16} color={c.border}/>
      <span style={{...sans,fontSize:13,color:C.textCard,flex:1}}>{msg}</span>
      {type==='error'&&<button onClick={onDone} style={{background:'none',border:'none',cursor:'pointer',color:C.mutedCard}}><Ic n="x" size={14} color={C.mutedCard}/></button>}
    </div>
  );
}

function Pill({label,active,onClick}){
  return(
    <button onClick={onClick} style={{flexShrink:0,padding:'7px 14px',borderRadius:99,border:'none',cursor:'pointer',
      background:active?C.orange:C.cardAlt,color:active?C.card:C.mutedCard,
      ...sans,fontSize:12,fontWeight:active?700:500,transition:'all 150ms ease',whiteSpace:'nowrap'}}>
      {label}
    </button>
  );
}

function GhostBtn({children,onClick,full,style:xs}){
  return(
    <button onClick={onClick} style={{width:full?'100%':'auto',padding:'11px 18px',borderRadius:8,
      border:`1px solid rgba(247,227,201,0.2)`,background:'transparent',color:C.textCard,cursor:'pointer',

      transition:'all 200ms ease',...xs}}>
      {children}
    </button>
  );
}

function OrangeBtn({children,onClick,full,disabled,style:xs}){
  return(
    <button onClick={onClick} disabled={disabled} style={{width:full?'100%':'auto',padding:'11px 18px',borderRadius:8,
      border:'none',background:disabled?'rgba(255,145,0,0.25)':C.orange,
      color:disabled?'rgba(255,145,0,0.5)':C.card,cursor:disabled?'not-allowed':'pointer',
      ...sans,fontSize:13,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',gap:8,
      transition:'all 200ms ease',...xs}}>
      {children}
    </button>
  );
}

function Card({children,style:xs,onClick}){
  return(
    <div onClick={onClick} style={{background:C.card,borderRadius:16,padding:16,border:`1px solid ${C.borderCard}`,...xs,
      cursor:onClick?'pointer':'default',transition:'transform 100ms ease',
      WebkitTapHighlightColor:'transparent'}}
      onMouseDown={e=>{if(onClick)e.currentTarget.style.transform='scale(0.97)'}}
      onMouseUp={e=>{if(onClick)e.currentTarget.style.transform='scale(1)'}}
      onTouchStart={e=>{if(onClick)e.currentTarget.style.transform='scale(0.97)'}}
      onTouchEnd={e=>{if(onClick)e.currentTarget.style.transform='scale(1)'}}>
      {children}
    </div>
  );
}

function Eyebrow({children,style:xs}){
  return<div style={{...mono,fontSize:9,fontWeight:700,letterSpacing:'0.2em',textTransform:'uppercase',color:C.orange,marginBottom:8,...xs}}>{children}</div>;
}

function Row({children,style:xs}){return<div style={{display:'flex',alignItems:'center',gap:8,...xs}}>{children}</div>;}
function RowBetween({children,style:xs}){return<div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8,...xs}}>{children}</div>;}
function Col({children,style:xs}){return<div style={{display:'flex',flexDirection:'column',gap:8,...xs}}>{children}</div>;}

function StatStrip({stats}){
  return(
    <div style={{display:'flex',gap:8,marginBottom:12}}>
      {stats.map((s,i)=>(

function CrewTab(){
  const [filter,setFilter]=useState('This Month');
  const [copied,setCopied]=useState(false);
  const [codeInput,setCodeInput]=useState('');
  const [codeState,setCodeState]=useState('idle');
  const [codeMsg,setCodeMsg]=useState('');
  const [sheet,setSheet]=useState(null);
  const debRef=useRef(null);

  function handleCopy(){
    navigator.clipboard.writeText(CREW.code).catch(()=>{});
    setCopied(true);
    setTimeout(()=>setCopied(false),2000);
  }

  function handleCodeChange(val){
    setCodeInput(val.toUpperCase());
    clearTimeout(debRef.current);
    if(!val){setCodeState('idle');setCodeMsg('');return;}
    setCodeState('checking');
    debRef.current=setTimeout(()=>{
      if(val.toUpperCase()==='RAFI15'){setCodeState('taken');setCodeMsg(`${val.toUpperCase()} is already taken ✗`);}
      else{setCodeState('available');setCodeMsg(`${val.toUpperCase()} is available ✓`);}
    },600);
  }

  const codeValid=codeInput.length>=4&&codeInput.length<=8&&/^[A-Z0-9]+$/.test(codeInput)&&codeState==='available';
  const months=['This Month','Last Month','All Time'];
  const pct=Math.round((CREW.lifetimePts/CREW.foundingTarget)*100);

  return(
    <div style={{padding:'24px 16px 0',position:'relative'}}>
      {/* Header */}
      <div style={{marginBottom:20}}>
        <div style={{...sans,fontSize:22,fontWeight:700,color:C.text}}>Midnight Crew</div>
        <div style={{...sans,fontSize:13,color:C.muted,marginTop:2}}>Your referral dashboard</div>
      </div>

      <StatStrip stats={[
        {label:'This Month',value:CREW.refsThisMonth,small:false},
        {label:'Points Earned',value:CREW.ptsThisMonth.toLocaleString(),small:false},
        {label:'Lifetime',value:CREW.lifetime,muted:true},
      ]}/>

      {/* My Code card */}
      <Card style={{marginBottom:12,textAlign:'center'}}>
        <Eyebrow>My Code</Eyebrow>
        <div style={{...mono,fontSize:36,fontWeight:700,color:C.orange,letterSpacing:4,marginBottom:8}}>{CREW.code}</div>
        <div style={{...sans,fontSize:12,color:C.mutedCard,marginBottom:16}}>Friends get {CREW.discount}% off their first order</div>
        <Row style={{justifyContent:'center',gap:8}}>
          <button onClick={handleCopy} style={{flex:1,padding:'10px 0',borderRadius:8,border:`1px solid ${C.orange}`,
            background:'transparent',color:copied?C.green:C.orange,cursor:'pointer',...sans,fontSize:13,fontWeight:600,
            display:'flex',alignItems:'center',justifyContent:'center',gap:6,transition:'all 200ms'}}>
            {copied?<><Ic n="check" size={14} color={C.green}/>Copied ✓</>:<><Ic n="share" size={14} color={C.orange}/>Copy Code</>}
          </button>
          <OrangeBtn style={{flex:1,padding:'10px 0'}}><Ic n="msg" size={14} color={C.card}/>WhatsApp</OrangeBtn>
        </Row>
      </Card>

      <StatStrip stats={[
        {label:'Total Used',value:CREW.totalUsed},
        {label:'This Month',value:CREW.thisMonth},
        {label:'Conversion',value:CREW.conversion,muted:true},
      ]}/>

      {/* Activity */}
      <div style={{...mono,fontSize:9,color:C.text,letterSpacing:'0.2em',textTransform:'uppercase',marginBottom:8}}>Referral Activity</div>
      <div style={{display:'flex',gap:8,marginBottom:12}}>
        {months.map(m=><Pill key={m} label={m} active={filter===m} onClick={()=>setFilter(m)}/>)}
      </div>
      {REFERRAL_ACTIVITY.map((r,i)=>(
        <div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 0',borderBottom:`1px solid ${C.borderBg}`}}>
          <div style={{...sans,fontSize:12,color:C.muted}}>{r.date}</div>
          <div style={{...sans,fontSize:13,color:C.text,flex:1,margin:'0 12px'}}>
            {r.type==='subscription'?`Subscription started via ${CREW.code}`:`Order placed via ${CREW.code}`}

          <span style={{...mono,fontSize:13,fontWeight:700,color:C.green}}>+{r.pts} pts</span>
        </div>
      ))}
      <Card style={{marginTop:0,padding:'12px 16px'}}>
        <RowBetween>
          <span style={{...sans,fontSize:12,color:C.mutedCard}}>Total from referrals:</span>
          <span style={{...mono,fontSize:14,fontWeight:700,color:C.orange}}>8,450 pts</span>
        </RowBetween>
      </Card>

      {/* Status & Milestones */}
      <div style={{...mono,fontSize:9,color:C.text,letterSpacing:'0.2em',textTransform:'uppercase',margin:'24px 0 8px'}}>Your Status</div>
      <Card style={{marginBottom:12}}>
        <Row style={{marginBottom:12}}>
          <span style={{...mono,fontSize:10,background:C.orangeFaint,color:C.orange,padding:'3px 10px',borderRadius:99,letterSpacing:'0.1em'}}>MIDNIGHT CREW</span>
        </Row>
        <div style={{...sans,fontSize:11,color:C.mutedCard,marginBottom:6}}>{(CREW.foundingTarget-CREW.lifetimePts).toLocaleString()} pts to Founding Crew</div>

        <div style={{height:1,background:C.borderCard,margin:'14px 0'}}/>
        {[
          {icon:'star',desc:'1,000 pts — Free sachet',done:true},
          {icon:'phone',desc:'5,000 pts — ৳100 bKash credit',done:true},
          {icon:'repeat',desc:'10,000 pts — Free month',done:false},
          {icon:'flame',desc:'25,000 pts — Founding Crew',done:false},
        ].map((m,i)=>(
          <RowBetween key={i} style={{padding:'10px 0',borderBottom:i<3?`1px solid ${C.borderCard}`:'none'}}>
            <Row>
              <Ic n={m.icon} size={16} color={m.done?C.orange:'rgba(247,227,201,0.3)'}/>
              <span style={{...sans,fontSize:13,color:m.done?C.textCard:'rgba(247,227,201,0.4)'}}>{m.desc}</span>
            </Row>
            {m.done?<Ic n="check" size={16} color={C.green}/>:<Ic n="lock" size={14} color='rgba(247,227,201,0.3)'/>}
          </RowBetween>
        ))}
      </Card>

      {/* Code settings */}
      <div style={{...mono,fontSize:9,color:C.text,letterSpacing:'0.2em',textTransform:'uppercase',marginBottom:8}}>Change My Code</div>
      <Card style={{marginBottom:12}}>
        <div style={{position:'relative',marginBottom:6}}>
          <DarkInput value={codeInput} onChange={e=>handleCodeChange(e.target.value)}
            placeholder="e.g. RAFI20"
            style={{...mono,letterSpacing:'0.15em',fontSize:16,paddingRight:40}}
            right={codeState==='checking'?<Ic n="loader" size={16} color={C.orange}/>:
                   codeState==='available'?<Ic n="check" size={16} color={C.green}/>:
                   codeState==='taken'?<Ic n="x" size={16} color={C.red}/>:null}/>
        </div>
        {codeMsg&&<div style={{...mono,fontSize:10,color:codeState==='available'?C.green:C.red,marginBottom:8}}>{codeMsg}</div>}
        <div style={{...sans,fontSize:11,color:C.mutedCard,marginBottom:12}}>4–8 characters · letters and numbers only</div>
        <OrangeBtn full disabled={!codeValid} onClick={()=>{}}>Save New Code</OrangeBtn>
        <div style={{...sans,fontSize:10,color:'rgba(247,227,201,0.5)',fontStyle:'italic',marginTop:8,textAlign:'center'}}>Your old code stops working immediately.</div>
      </Card>
      <div style={{height:100}}/>
    </div>
  );
}

function AdminCouponsTab(){

  const [codeState,setCodeState]=useState('idle');

  const [influencers,setInfluencers]=useState(INFLUENCER_CODES);
  const [paySheet,setPaySheet]=useState(null);
  const debRef=useRef(null);

  function handleCodeInput(val){
    setForm(f=>({...f,code:val.toUpperCase()}));
    clearTimeout(debRef.current);
    if(!val){setCodeState('idle');setCodeMsg('');return;}
    setCodeState('checking');
    debRef.current=setTimeout(()=>{
      if(['EID2026','FINALS26'].includes(val.toUpperCase())){setCodeState('taken');setCodeMsg(`${val.toUpperCase()} is already taken ✗`);}
      else{setCodeState('available');setCodeMsg(`${val.toUpperCase()} is available ✓`);}
    },600);

function useIsMobile(){
  const[m,setM]=useState(()=>typeof window!=='undefined'&&window.innerWidth<768);
  useEffect(()=>{
    const h=()=>setM(window.innerWidth<768);
    window.addEventListener('resize',h,{passive:true});
    return()=>window.removeEventListener('resize',h);
  },[]);
  return m;
}

      <div style={{padding:'0 20px',flex:1}}>
        <div style={{background:C.card,borderRadius:20,padding:20,marginBottom:12,
          boxShadow:'0 2px 20px rgba(44,24,16,0.1)'}}>

          {/* Email */}
          <div style={{marginBottom:14}}>
            <div style={{...mono,fontSize:9,color:C.mutedCard,letterSpacing:'0.2em',textTransform:'uppercase',marginBottom:8}}>Email</div>
            <input type="email" value={email} placeholder="your@email.com" autoComplete="email"
              onChange={e=>{setEmail(e.target.value);setError('');}}
              onKeyDown={e=>e.key==='Enter'&&attempt()}
              style={{...inputStyle}}/>
          </div>

          {/* Password */}
          <div style={{marginBottom:error?12:20}}>
            <div style={{...mono,fontSize:9,color:C.mutedCard,letterSpacing:'0.2em',textTransform:'uppercase',marginBottom:8}}>Password</div>
            <div style={{position:'relative'}}>
              <input type={showPw?'text':'password'} value={password} placeholder="••••••••" autoComplete="current-password"
                onChange={e=>{setPassword(e.target.value);setError('');}}
                onKeyDown={e=>e.key==='Enter'&&attempt()}
                style={{...inputStyle,paddingRight:44}}/>
              <button onClick={()=>setShowPw(v=>!v)}
                style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',
                  background:'none',border:'none',cursor:'pointer',color:C.mutedCard,
                  display:'flex',alignItems:'center',lineHeight:0}}>
                <Ic n={showPw?'chevup':'chevdown'} size={16} color={C.mutedCard}/>
              </button>
            </div>
          </div>

          {/* Error */}
          {error&&<div style={{...sans,fontSize:13,color:C.red,marginBottom:16,display:'flex',alignItems:'center',gap:6}}>
            <Ic n="alert" size={14} color={C.red}/>{error}
          </div>}

          {/* Submit */}
          <OrangeBtn full onClick={attempt} disabled={loading}>
            {loading?<Ic n="loader" size={16} color={C.card}/>:null}
            {loading?'Signing in…':'Sign In'}
          </OrangeBtn>
        </div>

        {/* Demo credentials */}
        <div style={{background:C.card,borderRadius:16,overflow:'hidden',marginBottom:32,
          boxShadow:'0 2px 12px rgba(44,24,16,0.06)'}}>
          <button onClick={()=>setHints(v=>!v)}
            style={{width:'100%',padding:'14px 16px',background:'none',border:'none',cursor:'pointer',
              display:'flex',alignItems:'center',justifyContent:'space-between',
              WebkitTapHighlightColor:'transparent'}}>
            <Row>
              <Ic n="alert" size={16} color={C.orange}/>
              <span style={{...sans,fontSize:13,fontWeight:600,color:C.textCard}}>Demo credentials</span>
            </Row>
            <Ic n={hints?'chevup':'chevdown'} size={16} color={C.mutedCard}/>
          </button>
          {hints&&(
            <div style={{borderTop:`1px solid ${C.borderCard}`}}>
              {DEMO_ACCOUNTS.map((d,i)=>(
                <button key={i} onClick={()=>fill(d)}
                  style={{width:'100%',padding:'12px 16px',background:'none',border:'none',cursor:'pointer',
                    borderBottom:i<DEMO_ACCOUNTS.length-1?`1px solid ${C.borderCard}`:'none',
                    textAlign:'left',WebkitTapHighlightColor:'transparent',display:'block'}}>
                  <div style={{...sans,fontSize:13,fontWeight:600,color:C.textCard,marginBottom:3}}>{d.label}</div>
                  <div style={{...mono,fontSize:11,color:C.mutedCard}}>{d.email}</div>
                  <div style={{...mono,fontSize:11,color:'rgba(247,227,201,0.4)'}}>password: {d.password}</div>
                </button>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function App(){
  const [role,setRole]=useState(null);
  const isMobile=useIsMobile();

  function handleLogout(){setRole(null);}

  // All four dashboard hooks called unconditionally — order never changes
  const userD=UserDashboard({onLogout:handleLogout});
  const crewD=CrewDashboard({onLogout:handleLogout});
  const inflD=InfluencerDashboard({onLogout:handleLogout});
  const adminD=AdminDashboard({onLogout:handleLogout});
  const dashMap={user:userD,crew:crewD,influencer:inflD,admin:adminD};
  const dash=role?dashMap[role]:null;

  // Active tab content (or login screen)
  const tabContent=role
    ? <div key={dash.tab} style={{animation:'fadeIn 150ms ease',minHeight:'100%'}}>{dash.content[dash.tab]}</div>
    : <LoginScreen onLogin={setRole}/>;

  /* ── MOBILE: fill entire screen ── */
  if(isMobile){
    return(
      <div style={{
        position:'relative',width:'100%',flex:1,
        display:'flex',flexDirection:'column',
        background:C.bg,overflow:'hidden',
        paddingTop:'env(safe-area-inset-top,0px)',
      }}>
        {role?(
          <>
            <div style={{flex:1,overflowY:'auto',overflowX:'hidden',minHeight:0,WebkitOverflowScrolling:'touch'}}>
              {tabContent}
            </div>
            <BottomNav role={dash.role} tab={dash.tab} setTab={dash.setTab} mobile/>
          </>
        ):tabContent}
      </div>
    );
  }

  /* ── DESKTOP: 390×844 phone frame ── */
  return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{
        width:390,height:844,borderRadius:40,overflow:'hidden',
        boxShadow:'0 0 0 8px #3a1a0a, 0 32px 64px rgba(0,0,0,0.6)',
        display:'flex',flexDirection:'column',position:'relative',background:C.bg,
      }}>
        {role&&<StatusBar/>}
        <div style={{flex:1,overflowY:'auto',overflowX:'hidden',background:C.bg,minHeight:0}}>
          {tabContent}
        </div>
        {role&&<BottomNav role={dash.role} tab={dash.tab} setTab={dash.setTab}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
